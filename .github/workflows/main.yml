name: Fetch arxiv JSON file

run-name: Fetching arxiv data

on:
  # push:
  #   branches: ["main"]
  schedule:
    # every X hours at minute 0 UTC
    - cron: '0 */12 * * *'
  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-arxiv:
    runs-on: ubuntu-latest

    steps:
      # 1) Get all branches + history so that future commits will work
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1) Setup Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2) Install dependencies
      # This assumes a requirements.txt file exists; otherwise, 
      # use 'pip install requests' or other specific libraries.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 3) Run the Python script
      - name: Run fetch-arxiv script
        run: python scripts/fetch-arxiv.py
        shell: bash

      # 4) Detect whether arxiv.json changed
      - name: Check for changes in data
        id: check-changes
        run: |
          git add arxiv.json
          # git diff --cached returns non-zero if there are staged changes
          if git diff --cached --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes=true"  >> "$GITHUB_OUTPUT"
          fi

      # 5) Commit & push only when JSON changed
      - name: Commit and push if changes
        if: steps.check-changes.outputs.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit -m "ci: update arXiv.json" arxiv.json
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main
