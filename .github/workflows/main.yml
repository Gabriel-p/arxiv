name: Fetch arxiv JSON file

run-name: Fetching arxiv data

on:
  # push:
  #   branches: ["main"]
  schedule:
    # every 12 hours at minute 0 UTC
    - cron: '0 */12 * * *'

  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-arxiv:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3) Install dependencies
      # This assumes a requirements.txt file exists; otherwise, 
      # use 'pip install requests' or other specific libraries.
      - name: Install dependencies
        run: |
          echo "Upgrading pip..."
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            echo "requirements.txt found. Installing dependencies..."
            pip install -r requirements.txt
          else
            echo "No requirements.txt file found. Skipping dependency installation."
          fi

      # 4) Run fetch-arxiv script
      - name: Run fetch-arxiv script
        run: |
          echo "Running fetch-arxiv.py..."
          python scripts/fetch-arxiv.py
          echo "Script execution finished."

      # 5) Check if new JSON file exists
      - name: Check for arxiv_new.json
        id: check-new-json
        run: |
          echo "Checking whether arxiv_new.json was generated..."

          if [ -f arxiv_new.json ]; then
            echo "arxiv_new.json exists."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new arXiv entries found."
            echo "arxiv_new.json was not generated."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # 6) Replace production JSON only if new file exists
      - name: Replace arxiv.json
        if: steps.check-new-json.outputs.exists == 'true'
        run: |
          echo "Replacing arxiv.json with arxiv_new.json..."
          mv arxiv_new.json arxiv.json
          echo "Replacement completed."

      # 7) Detect changes
      - name: Check for changes in data
        if: steps.check-new-json.outputs.exists == 'true'
        id: check-changes
        run: |
          echo "Checking for git changes..."

          git add arxiv.json
          # git diff --cached returns non-zero if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes detected in arxiv.json."
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected in arxiv.json."
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      # 8) Commit and push only if changed
      - name: Commit and push if changes
        if: steps.check-new-json.outputs.exists == 'true' && steps.check-changes.outputs.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Configuring git user..."

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          echo "Creating commit..."
          git commit -m "ci: update arxiv.json"

          echo "Pushing changes to repository..."
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main

          echo "Push completed successfully."

      # 9) Inform when nothing changed
      - name: No changes detected
        if: steps.check-new-json.outputs.exists == 'true' && steps.check-changes.outputs.changes == 'false'
        run: |
          echo "A new arxiv_new.json file was generated, but its contents are identical to arxiv.json."
          echo "Nothing to commit."