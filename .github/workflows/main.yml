name: Fetch arxiv JSON file

run-name: Fetching arxiv data

on:
  # push:
  #   branches: ["main"]
  schedule:
    # every X hours at minute 0 UTC
    - cron: '0 */12 * * *'

  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-arxiv:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3) Install dependencies
      # This assumes a requirements.txt file exists; otherwise, 
      # use 'pip install requests' or other specific libraries.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # 4) Generate temporary JSON file
      - name: Run fetch-arxiv script
        run: python scripts/fetch-arxiv.py
        shell: bash

      # 5) Validate generated JSON
      - name: Validate JSON content
        id: validate-json
        run: |
          title=$(jq -r '.title // ""' arxiv_new.json)
          if [ "$title" = "No articles found" ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "valid=true" >> "$GITHUB_OUTPUT"
          fi

      # 6) Replace production JSON only if valid
      - name: Replace arxiv.json
        if: steps.validate-json.outputs.valid == 'true'
        run: |
          mv arxiv_new.json arxiv.json

      # 7) Detect changes
      - name: Check for changes in data
        if: steps.validate-json.outputs.valid == 'true'
        id: check-changes
        run: |
          git add arxiv.json
          # git diff --cached returns non-zero if there are staged changes
          if git diff --cached --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      # 8) Commit and push only if changed
      - name: Commit and push if changes
        if: steps.validate-json.outputs.valid == 'true' && steps.check-changes.outputs.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit -m "ci: update arxiv.json"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main

      # 9) Cleanup temporary file if validation failed
      - name: Cleanup invalid temporary file
        if: steps.validate-json.outputs.valid == 'false'
        run: |
          rm -f arxiv_new.json
